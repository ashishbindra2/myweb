<div id="w">
    <div class="login_area">
        <div class="logo_area">
            <img src="../../../assets/img//fiscaquest_logo.png" alt="FiscaQuest">
            <img src="../../../assets/img//seesharp_logo.png" alt="SeeSharp">
        </div>

        <div class="login_block">

            <form method="post">
                <div class="form">
                    <img src="../../../assets/img//big_img.png" class="big_img">
                    <h1>Login to your Account</h1>



                    <div class="mb-3 mt-5">
                        <label><img src="../../../assets/img//email_icon.svg"> Email</label>
                        <input type="text" name="email">
                    </div>

                    <div class="mb-2">
                        <label><img id="pass" src="../../../assets/img//password_icon.svg"> Password</label>
                        <input type="password" name="password">
                    </div>

                    <div class="mb-2">
                        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                        <label class="form-check-label" for="flexCheckDefault">
                        Remember Me
                    </label>
                        <!--                    <a href="" class="forget_pass">Forgot Password?</a>-->
                    </div>

                    <button type="submit" class="btn login_btn mt-5 mb-3">Login</button>

                </div>
            </form>
        </div>
    </div>
</div>
